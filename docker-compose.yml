services:
  backend:
    container_name: runmq_dashboard_backend
    build: ./backend
    network_mode: host
    environment:
      PORT: 3001
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 15672
      RABBITMQ_MANAGEMENT_USER: guest
      RABBITMQ_MANAGEMENT_PASSWORD: guest
      RABBITMQ_VHOST: /
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 24h
      USERS_CONFIG_PATH: ./config/users.json
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - users_data:/app/config

  frontend:
    container_name: runmq_dashboard_frontend
    build: ./frontend
    network_mode: host
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  users_data:
